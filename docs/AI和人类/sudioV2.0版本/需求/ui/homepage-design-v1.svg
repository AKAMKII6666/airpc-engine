<svg width="1728" height="1040" viewBox="0 0 1728 1040" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AirPC Studio V2 Homepage Design V1</title>
  <desc id="desc">A dark operational homepage dashboard for AirPC Studio V2, focused on recent story packages, creation, import, validation, and engine status.</desc>
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#536BFF"/>
      <stop offset="0.58" stop-color="#7A5CFF"/>
      <stop offset="1" stop-color="#32D6FF"/>
    </linearGradient>
    <linearGradient id="markPrimary" x1="76" y1="24" x2="128" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C8CFF"/>
      <stop offset="0.5" stop-color="#536BFF"/>
      <stop offset="1" stop-color="#32D6FF"/>
    </linearGradient>
    <linearGradient id="markSecondary" x1="42" y1="110" x2="92" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25D0A2"/>
      <stop offset="0.45" stop-color="#3AA8FF"/>
      <stop offset="1" stop-color="#7A5CFF"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#132236" opacity="0.52"/>
    </pattern>
  </defs>

